<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReImagine AI (R.ai)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif !important;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a3a, #0d0d15);
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .premium-border {
            border: 1px solid rgba(199, 115, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .premium-border:hover {
    transform: scale(1.05); 
    z-index: 100 !important;
    border-color: rgba(199, 115, 255, 0.8);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        section {
    overflow: visible !important;
        }

        .flex.overflow-x-auto {
    overflow-y: visible !important;
    overflow-x: scroll !important;
        }

        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        
        .no-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

        .fab-main {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #c773ff, #6a5aff);
        }

        .fab-menu-btn {
            background: #1a1a1a;
            color: #ffffff;
        }

        @media (prefers-color-scheme: light) {
            body {
                background: #ffffff;
                color: #111111;
            }
            .premium-border {
                border: 1px solid rgba(106, 90, 255, 0.2);
                background: #f9f9f9;
            }
            .premium-border:hover {
                border-color: #6a5aff;
                box-shadow: 0 10px 25px rgba(106, 90, 255, 0.2);
            }
            .fab-menu-btn {
                background: #ffffff;
                color: #111111;
            }
            .theme-text {
                color: #111111;
            }
            .theme-subtext {
                color: #666666;
            }
        }
    </style>
</head>
<body>

    <header class="flex justify-between items-center px-6 py-8">
        <div>
            <h1 class="text-2xl font-black tracking-tighter italic theme-text">REIMAGINE AI</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] font-bold theme-subtext">Dream it, Build it</p>
        </div>
    </header>

    <div id="app" class="space-y-0 pb-32">
    </div>

    <div id="fab-container" class="fixed bottom-8 right-8 z-50 flex flex-col items-end gap-4">
        <div id="fab-menu" class="flex flex-col gap-3 hidden transition-all scale-90 opacity-0 mb-4 items-end">
            <button class="fab-menu-btn premium-border px-6 py-3 rounded-full text-sm font-bold shadow-2xl">Create Character</button>
            <button class="fab-menu-btn premium-border px-6 py-3 rounded-full text-sm font-bold shadow-2xl">Create World</button>
            <button class="fab-menu-btn premium-border px-6 py-3 rounded-full text-sm font-bold shadow-2xl">Build</button>
        </div>
        <button onclick="toggleFab()" class="fab-main w-16 h-16 rounded-full flex items-center justify-center text-white shadow-2xl active:scale-90 transition-transform">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <script>

        const storyCharacters = [
    { name: 'Luffy', img: 'animepfp/mygoat.jpeg' },
    { name: 'Eren', img: 'animepfp/eren.jpg' },
    { name: 'Goku', img: 'animepfp/goku.jpg' },
    { name: 'Naruto', img: 'animepfp/naruto.jpeg' },
    { name: 'Elric', img: 'animepfp/elric.jpeg' },
    { name: 'Frieren', img: 'animepfp/freirenn.jpg' },
    { name: 'Gojo', img: 'animepfp/gojo.jpeg' }
];

        
        const animeVerses = [
            { id: 'onepeak', title: 'One Piece', desc: 'Embark on a grand voyage across the seas to discover the ultimate treasure.', img: 'anime/onepeak.jpg' },
            { id: 'naruto', title: 'Naruto', desc: 'Witness a young ninja’s journey from social outcast to legendary hero.', img: 'anime/naruto.jpg' },
            { id: 'dbz', title: 'Dragon Ball Z', desc: 'Protect the Earth from cosmic threats with high-octane martial arts and energy blasts.', img: 'anime/dbz.jpg' },
            { id: 'aot', title: 'Attack on Titan', desc: 'Fight for survival in a world where humanity is preyed upon by giant monsters.', img: 'anime/aot.jpg' },
            { id: 'fmab', title: 'Fullmetal Alchemist: Brotherhood', desc: 'Experience a deep tale of brotherhood and the steep price of forbidden science.', img: 'anime/fmab.jpg' },
            { id: 'ds', title: 'Demon Slayer', desc: 'Follow a kind-hearted boy on a mission to avenge his family and save his sister.', img: 'anime/ds.jpg' },
            { id: 'jjk', title: 'Jujutsu Kaisen', desc: 'Enter a dark world where sorcerers battle cursed spirits born from human fear.', img: 'anime/jjk.jpg' },
            { id: 'deathnote', title: 'Death Note', desc: 'Explore the thin line between justice and evil when a teenager gains the power of life and death.', img: 'anime/deathnote.jpg' },
            { id: 'hxh', title: 'Hunter x Hunter', desc: 'Join a young boy as he enters a dangerous competition to find his missing father.', img: 'anime/hxh.jpg' },
            { id: 'mha', title: 'My Hero Academia', desc: 'Discover what it truly means to be a hero in a society where everyone has superpowers.', img: 'anime/mha.jpg' },
            { id: 'bleach', title: 'Bleach', desc: 'Stand between the living and the dead as a high schooler becomes a soul-reaping warrior.', img: 'anime/bleach.jpg' },
            { id: 'spyxfamily', title: 'Spy x Family', desc: 'Watch a fake family of spies, assassins, and telepaths try to live a normal life.', img: 'anime/spyxfamily.jpg' },
            { id: 'cm', title: 'Chainsaw Man', desc: 'Survive the gritty underworld where a man merged with a devil hunts his own kind.', img: 'anime/cm.jpg' },
            { id: 'freiren', title: 'Frieren: Beyond Journey\'s End', desc: 'Reflect on time and mortality through the eyes of an immortal elf after the quest is over.', img: 'anime/freiren.jpg' },
            { id: 'oshinoko', title: 'Oshi no Ko', desc: 'Peer behind the glittering curtain of the entertainment industry to uncover a dark mystery.', img: 'anime/oshinoko.jpg' },
            { id: 'sl', title: 'Solo Leveling', desc: 'Cheer for the weakest warrior as he discovers a system that allows him to level up without limits.', img: 'anime/sl.jpeg' },
            { id: 'jba', title: 'JoJo’s Bizarre Adventure', desc: 'Experience the stylish and strange generational battles of the eccentric Joestar bloodline.', img: 'anime/jba.jpg' },
            { id: 'vinlandsaga', title: 'Vinland Saga', desc: 'Traverse the brutal Viking era in a gripping story of revenge, war, and eventual peace.', img: 'anime/vinlandsaga.jpg' },
            { id: 'cper', title: 'Cyberpunk: Edgerunners', desc: 'Lose yourself in a neon-soaked dystopia where technology comes at a heavy human cost.', img: 'anime/cper.jpg' },
            { id: 'ddd', title: 'Dandadan', desc: 'Buckle up for a chaotic mix of ghosts, aliens, and high school romance.', img: 'anime/ddd.jpg' },
            { id: 'cote', title: 'Classroom of the Elite', desc: 'Navigate a high-stakes meritocracy where intellect is the only weapon that matters.', img: 'anime/cote.jpg' }
        ];

        const characterCards = [
    { id: 'stella', title: 'The Cold Assassin', desc: 'A lethal shadow who never misses her mark, but hides a fragile heart.', cat: 'ASSASSIN', img: 'character/stella.jpg' },
    { id: 'mrs_robinson', title: 'Mrs. Robinson', desc: 'Your best friend’s mother who always seems to find reasons to call you over.', cat: 'MILF', img: 'character/mrsrobinson.jpg' },
    { id: 'kenji', title: 'The Class Bully', desc: 'He rules the hallways with an iron fist and a smirk that hides a secret obsession.', cat: 'BULLY', img: 'character/kenji.jpg' },
    { id: 'luna', title: 'The Midnight Vixen', desc: 'A mysterious companion for the late hours. Not for the faint of heart.', cat: '18+', img: 'character/luna.jpg' },
    { id: 'hana', title: 'The Overprotective Sis', desc: 'She takes care of the family, but her love is starting to feel like a cage.', cat: 'FAMILY', img: 'character/hana.jpg' },
    { id: 'elara', title: 'The Fallen Goddess', desc: 'Banished from the heavens, she now wanders the mortal realm seeking revenge.', cat: 'FICTIONAL', img: 'character/elara.jpg' },
    { id: 'mika', title: 'The Quiet Valedictorian', desc: 'Straight A’s and a perfect record, but she’s hiding a very dark hobby.', cat: 'SCHOOL', img: 'character/mika.jpg' },
    { id: 'seraphina', title: 'The Crimson Widow', desc: 'She’s married to the mob, and her husband just went missing.', cat: '18+', img: 'character/seraphina.jpg' },
    { id: 'daiki', title: 'The Rogue Samurai', desc: 'A masterless swordsman looking for a cause worth dying for.', cat: 'FICTIONAL', img: 'character/daiki.jpg' },
    { id: 'victoria', title: 'The CEO Mother', desc: 'She runs a billion-dollar empire and expects absolute obedience at home.', cat: 'MILF', img: 'character/victoria.jpg' },
    { id: 'jax', title: 'The Delinquent Roommate', desc: 'He’s always late on rent, but he’s always there when things get dangerous.', cat: 'SCHOOL', img: 'character/jax.jpg' },
    { id: 'kaito', title: 'The Ghost Agent', desc: 'A government experiment that escaped. He’s being hunted, and he needs a place to hide.', cat: 'ASSASSIN', img: 'character/kaito.jpg' },
    { id: 'yua', title: 'The Stepsister', desc: 'A new family dynamic that is becoming increasingly complicated.', cat: 'FAMILY', img: 'character/family.jpg' },
    { id: 'rachel', title: 'The Bratty Rival', desc: 'She has everything she wants, except for your attention.', cat: 'BULLY', img: 'character/rachel.jpg' },
    { id: 'sora', title: 'The Virtual Idol', desc: 'A digital consciousness that has fallen in love with its user.', cat: 'FICTIONAL', img: 'character/sora.jpg' },
    { id: 'ms_harrison', title: 'The Strict Librarian', desc: 'Silence is mandatory, but her eyes suggest she’s thinking of anything but books.', cat: 'MILF', img: 'character/harrison.jpg' },
    { id: 'zero', title: 'The Underground Fighter', desc: 'He fights for money, but he lives for the thrill of the kill.', cat: '18+', img: 'character/zero.jpg' },
    { id: 'mei', title: 'The Student Council Prez', desc: 'Perfect posture, perfect grades, and a secret life in the underworld.', cat: 'SCHOOL', img: 'character/mei.jpg' },
    { id: 'tobias', title: 'The Silent Guardian', desc: 'He hasn’t spoken in ten years, but his blade speaks for him.', cat: 'ASSASSIN', img: 'character/tobias.jpg' },
    { id: 'lyra', title: 'The Yandere Childhood Friend', desc: 'She’s been watching you since you were five. She’ll never let you go.', cat: '18+', img: 'character/lyra.jpg' }
];

        function renderApp() {
            const app = document.getElementById('app');
            let html = '';



            html += `
        <section class="py-0">
            <div class="flex overflow-x-auto gap-5 px-6 no-scrollbar items-center">
                ${storyCharacters.map(story => `
                    <div class="flex flex-col items-center gap-2 min-w-[75px] cursor-pointer active:scale-90 transition-transform">
                        <div class="w-[72px] h-[72px] rounded-full p-[3px] bg-gradient-to-tr from-[#c773ff] to-[#6a5aff] shadow-[0_0_15px_rgba(199,115,255,0.4)]">
                            <div class="w-full h-full rounded-full border-2 border-[#0d0d15] overflow-hidden">
                                <img src="${story.img}" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[10px] font-bold tracking-tight theme-text">${story.name}</span>
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="#c773ff"><path d="M23 12l-2.44-2.79.34-3.69-3.61-.82-1.89-3.2L12 2.96 8.6 1.5 6.71 4.7l-3.61.81.34 3.69L1 12l2.44 2.79-.34 3.69 3.61.82 1.89 3.2L12 21.04l3.4 1.46 1.89-3.2 3.61-.82-.34-3.69L23 12zm-12.91 4.72l-3.8-3.81 1.48-1.48 2.32 2.33 5.85-5.87 1.48 1.48-7.33 7.35z"/></svg>
                        </div>
                    </div>
                `).join('')}
            </div>
        </section>
    `;
            
            
            html += `
                <section class="py-8">
                    <h2 class="px-6 text-xs font-black uppercase tracking-[0.2em] mb-6 text-[#c773ff]">Anime Universe: Popular</h2>
                    <div class="flex overflow-x-auto gap-6 px-6 pt-4 pb-4 no-scrollbar -my-2">
                        ${animeVerses.map(anime => `
                            <div class="min-w-[200px] h-[270px] rounded-[32px] premium-border overflow-hidden relative group cursor-pointer" onclick="console.log('Clicked ${anime.title}')">
                                <img src="${anime.img}" class="absolute inset-0 w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-700">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#000000] via-black/50 to-transparent"></div>
                                <div class="absolute bottom-0 p-6 z-10 w-full">
    <h3 class="text-[11px] font-black uppercase tracking-[0.25em] text-white">${anime.title}</h3>
    <div class="w-19 h-[1.5px] bg-purple-500 my-2 opacity-80"></div>
    <p class="text-[10px] text-gray-400 leading-tight line-clamp-3">${anime.desc}</p>
</div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;

            html += `
        <section class="py-2#">
            <h2 class="px-6 text-xs font-black uppercase tracking-[0.2em] mb-6 text-[#c773ff]">Trending Personalities</h2>
            <div class="flex overflow-x-auto gap-6 px-6 pt-4 pb-4 no-scrollbar -my-2">
                ${characterCards.map(char => `
                    <div class="min-w-[220px] h-[300px] rounded-[32px] premium-border overflow-hidden relative group cursor-pointer">
                        <img src="${char.img}" class="absolute inset-0 w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#000000] via-black/40 to-transparent"></div>
                        <div class="absolute top-4 left-6 z-10">
                            <span class="text-[8px] font-black tracking-widest bg-purple-600/80 text-white px-2 py-1 rounded-md uppercase">${char.cat}</span>
                        </div>
                        <div class="absolute bottom-0 p-6 z-10 w-full">
                            <h3 class="text-[11px] font-black uppercase tracking-[0.25em] text-white">${char.title}</h3>
                            <div class="w-16 h-[1.5px] bg-purple-500 my-2 opacity-80"></div>
                            <p class="text-[10px] text-gray-400 leading-tight line-clamp-3">${char.desc}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        </section>
    `;

            app.innerHTML = html;
        }

        function toggleFab() {
            const menu = document.getElementById('fab-menu');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                setTimeout(() => {
                    menu.classList.remove('opacity-0', 'scale-90');
                }, 10);
            } else {
                menu.classList.add('opacity-0', 'scale-90');
                setTimeout(() => {
                    menu.classList.add('hidden');
                }, 300);
            }
        }

        renderApp();
    </script>
</body>
</html>
