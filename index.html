<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.ai - Dream it, Build it</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; scroll-behavior: smooth; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); }
        .anime-card:hover { transform: scale(1.05); border-color: #ef4444; }
        .fab-child { transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 0; transform: translateY(20px) scale(0); pointer-events: none; }
        .fab-container:hover .fab-child { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-40 glass border-b border-white/10 p-4">
        <h1 class="text-xl font-black tracking-tighter text-center">
            REIMAGINE AI <span class="text-red-500">(R.ai)</span>
            <div class="text-[10px] font-light text-gray-400 uppercase tracking-[0.2em]">Dream it, Build it</div>
        </h1>
    </header>

    <main class="mt-6 space-y-10">

        <section>
            <h2 class="px-4 text-lg font-bold mb-3 flex items-center gap-2">
                <i class="fa-solid fa-fire text-orange-500"></i> Anime Universe
            </h2>
            <div class="flex overflow-x-auto gap-4 px-4 hide-scrollbar snap-x">
                <div class="snap-center min-w-[160px] h-60 bg-zinc-900 rounded-xl border border-white/5 anime-card transition-all overflow-hidden relative" onclick="startChat('Naruto')">
                    <img src="https://via.placeholder.com/160x240" class="object-cover h-full w-full opacity-50">
                    <div class="absolute bottom-0 p-3 w-full glass">
                        <p class="text-xs font-bold">Naruto RP</p>
                    </div>
                </div>
                </div>
        </section>

        <section>
            <h2 class="px-4 text-lg font-bold mb-3 flex items-center gap-2">
                <i class="fa-solid fa-mask text-purple-500"></i> Personalities
            </h2>
            <div class="flex overflow-x-auto gap-4 px-4 hide-scrollbar snap-x">
                <div class="snap-center min-w-[200px] h-32 bg-zinc-900 rounded-xl border border-white/5 p-4 flex flex-col justify-between" onclick="startChat('Yandere')">
                    <span class="text-xs bg-red-500/20 text-red-500 w-fit px-2 py-0.5 rounded">Yandere</span>
                    <p class="text-sm font-bold">The Obsessive Stalker</p>
                    <p class="text-[10px] text-gray-400">She'll never let you go...</p>
                </div>
                </div>
        </section>

        <section>
            <h2 class="px-4 text-lg font-bold mb-3 flex items-center gap-2">
                <i class="fa-solid fa-earth-americas text-blue-500"></i> World Scenarios
            </h2>
            <div class="grid grid-cols-2 gap-4 px-4">
                <div class="h-40 bg-zinc-900 rounded-xl border border-white/5 p-4 relative overflow-hidden" onclick="startChat('Isekai')">
                    <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                    <p class="absolute bottom-3 left-3 text-sm font-bold">Isekai: Reborn as a Sword</p>
                </div>
                <div class="h-40 bg-zinc-900 rounded-xl border border-white/5 p-4 relative overflow-hidden" onclick="startChat('Cyberpunk')">
                    <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                    <p class="absolute bottom-3 left-3 text-sm font-bold">Cyberpunk 2099</p>
                </div>
            </div>
        </section>

    </main>

    <div class="fixed bottom-6 right-6 flex flex-col-reverse items-center gap-4 fab-container">
        <button class="w-14 h-14 bg-red-600 rounded-full shadow-lg shadow-red-600/40 flex items-center justify-center text-2xl z-50">
            <i class="fa-solid fa-feather-pointed text-white"></i>
        </button>

        <div class="flex flex-col gap-3 pb-2">
            <button class="fab-child w-12 h-12 bg-zinc-800 rounded-full flex items-center justify-center shadow-lg border border-white/10" title="Build">
                <i class="fa-solid fa-hammer text-sm"></i>
            </button>
            <button class="fab-child w-12 h-12 bg-zinc-800 rounded-full flex items-center justify-center shadow-lg border border-white/10" title="Create World">
                <i class="fa-solid fa-globe text-sm"></i>
            </button>
            <button class="fab-child w-12 h-12 bg-zinc-800 rounded-full flex items-center justify-center shadow-lg border border-white/10" title="Create Character">
                <i class="fa-solid fa-user-plus text-sm"></i>
            </button>
        </div>
    </div>

    <script>
        function startChat(type) {
            alert("Starting " + type + " roleplay...");
            
        }
    </script>

</body>
      </html>
